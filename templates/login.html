{{template "layout.html" .}}
{{define "content"}}
<div class="flex flex-col items-center justify-center min-h-[75vh] py-12">
    <div class="w-full max-w-sm">

        <div class="text-center mb-10">
            <img src="/static/favicon.png" class="w-20 h-20 rounded-3xl mx-auto mb-4 shadow-lg">
            <h1 class="text-3xl font-extrabold" style="color:var(--navy);">
                Run<span style="color:var(--mint);">Mate</span>
            </h1>
            <p class="mt-2 text-sm" style="color:var(--text2);">소셜 계정으로 간편하게 시작하세요</p>
        </div>

        <div id="error-msg" class="hidden rounded-xl px-4 py-3 mb-6 text-sm text-center" style="background-color:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#ef4444;">
            <i class="fas fa-exclamation-circle mr-1"></i>로그인 중 오류가 발생했습니다. 다시 시도해주세요.
        </div>
        <script>
            if (new URLSearchParams(window.location.search).get('error')) {
                document.getElementById('error-msg').classList.remove('hidden');
            }
        </script>

        <div class="space-y-3">
            <a href="/auth/google"
               class="flex items-center justify-center gap-3 w-full rounded-xl px-4 py-3.5 font-semibold text-sm transition-all"
               style="background-color:var(--surface);border:1px solid var(--border);color:var(--navy);"
               onmouseover="this.style.borderColor='var(--mint)';this.style.backgroundColor='var(--surface2)';"
               onmouseout="this.style.borderColor='var(--border)';this.style.backgroundColor='var(--surface)';">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Google로 계속하기
            </a>

            <a href="/auth/kakao"
               class="flex items-center justify-center gap-3 w-full rounded-xl px-4 py-3.5 font-semibold text-sm transition-all"
               style="background-color:#FEE500;border:1px solid #FEE500;color:#3C1E1E;"
               onmouseover="this.style.backgroundColor='#F0D900';"
               onmouseout="this.style.backgroundColor='#FEE500';">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="#3C1E1E">
                    <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.7 1.697 5.088 4.29 6.486L5.143 21l4.696-2.485c.71.1 1.44.152 2.161.152 5.523 0 10-3.477 10-7.867C22 6.477 17.523 3 12 3z"/>
                </svg>
                카카오로 계속하기
            </a>

            <a href="/auth/naver"
               class="flex items-center justify-center gap-3 w-full rounded-xl px-4 py-3.5 font-semibold text-sm transition-all"
               style="background-color:#03C75A;border:1px solid #03C75A;color:white;"
               onmouseover="this.style.backgroundColor='#02B350';"
               onmouseout="this.style.backgroundColor='#03C75A';">
                <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="white">
                    <path d="M13.73 12.37L6.63 2H2v20h10.27V11.63L19.37 22H24V2H13.73v10.37z"/>
                </svg>
                네이버로 계속하기
            </a>
        </div>

        <p class="text-center text-xs mt-8" style="color:var(--text3);">
            로그인하면 <span style="color:var(--mint);font-weight:700;">내 마라톤 관리</span>와<br>
            <span style="color:var(--mint);font-weight:700;">러닝 기록 저장</span> 기능을 이용할 수 있어요
        </p>
    </div>
</div>
{{end}}
