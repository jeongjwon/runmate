{{template "layout.html" .}}
{{define "content"}}
{{$loggedIn := ne .User nil}}
<div class="mb-6 flex flex-col gap-4">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-flag-checkered text-orange-500 mr-2"></i>마라톤 일정</h1>
        <div id="crawl-status" class="hidden text-sm text-orange-500 flex items-center gap-1">
            <i class="fas fa-sync-alt fa-spin"></i> 최신 일정 불러오는 중...
        </div>
    </div>
    <!-- 검색 + 필터 -->
    <div class="flex flex-col md:flex-row gap-2">
        <div class="relative flex-1">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="search-input" type="text" placeholder="대회명 또는 장소 검색"
                class="w-full border border-gray-200 rounded-lg pl-9 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
        </div>
        <select id="filter-city" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            <option value="">전체 지역</option>
        </select>
        <select id="filter-category" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300">
            <option value="">전체 종목</option>
            <option value="5K">5K</option>
            <option value="10K">10K</option>
            <option value="Half">하프</option>
            <option value="Full">풀코스</option>
        </select>
    </div>
    <!-- 결과 수 -->
    <p id="result-count" class="text-sm text-gray-400"></p>
</div>

<div id="marathon-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5"></div>

<!-- 참가 신청 모달 -->
<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl w-full max-w-md shadow-xl">
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">
            <h2 class="text-lg font-bold text-gray-800">참가 신청</h2>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl"><i class="fas fa-times"></i></button>
        </div>
        <div class="p-6">
            <p class="text-orange-600 font-semibold mb-4" id="modal-marathon-name"></p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이름 *</label>
                    <input id="reg-name" type="text" placeholder="홍길동" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-300">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이메일</label>
                    <input id="reg-email" type="email" placeholder="example@email.com" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-300">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">종목 *</label>
                    <select id="reg-category" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-orange-300">
                    </select>
                </div>
            </div>
        </div>
        <div class="p-6 pt-0 flex gap-3">
            <button onclick="closeModal()" class="flex-1 border border-gray-200 rounded-lg py-2 text-gray-600 hover:bg-gray-50 transition-colors">취소</button>
            <button onclick="submitRegistration()" class="flex-1 bg-orange-500 text-white rounded-lg py-2 font-semibold hover:bg-orange-600 transition-colors">신청하기</button>
        </div>
    </div>
</div>

<script>
const IS_LOGGED_IN = {{if $loggedIn}}true{{else}}false{{end}};
let selectedMarathonId = null;
let searchTimer = null;

const categoryLabels = { '5K': '5K', '10K': '10K', 'Half': '하프 (21.1km)', 'Full': '풀코스 (42.195km)' };

async function loadCities() {
    const res = await fetch('/api/marathons/cities');
    const { data } = await res.json();
    const select = document.getElementById('filter-city');
    (data || []).forEach(city => {
        const opt = document.createElement('option');
        opt.value = city;
        opt.textContent = city;
        select.appendChild(opt);
    });
}

async function loadMarathons() {
    const city = document.getElementById('filter-city').value;
    const category = document.getElementById('filter-category').value;
    const search = document.getElementById('search-input').value.trim();

    const params = new URLSearchParams();
    if (city) params.set('city', city);
    if (category) params.set('category', category);
    if (search) params.set('search', search);

    const url = '/api/marathons' + (params.toString() ? '?' + params.toString() : '');
    const res = await fetch(url);
    const { data } = await res.json();
    renderMarathons(data || []);
}

function renderMarathons(marathons) {
    const container = document.getElementById('marathon-list');
    const countEl = document.getElementById('result-count');
    countEl.textContent = `총 ${marathons.length}개 대회`;

    if (!marathons.length) {
        container.innerHTML = '<p class="text-gray-400 col-span-3 text-center py-12">조건에 맞는 마라톤이 없습니다.</p>';
        return;
    }
    const today = new Date().toISOString().split('T')[0];
    container.innerHTML = marathons.map(m => {
        const categories = m.categories ? m.categories.split(',') : [];
        const isPast = m.date < today;
        const fee = m.entry_fee > 0 ? m.entry_fee.toLocaleString() + '원' : '미정';
        const officialLink = m.official_url
            ? `<a href="${m.official_url}" target="_blank" class="flex-1 border border-gray-200 rounded-lg py-2 text-center text-sm text-gray-600 hover:bg-gray-50 transition-colors"><i class="fas fa-external-link-alt mr-1"></i>공식 홈페이지</a>`
            : `<span class="flex-1 border border-gray-100 rounded-lg py-2 text-center text-sm text-gray-300">홈페이지 없음</span>`;
        return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 card-hover overflow-hidden">
            <div class="bg-gradient-to-r from-orange-400 to-rose-400 px-5 py-4">
                <div class="flex justify-between items-start">
                    <span class="bg-white bg-opacity-20 text-white text-xs px-2 py-1 rounded-full">${m.city || '지역 미상'}</span>
                    ${isPast
                        ? '<span class="bg-gray-700 bg-opacity-50 text-white text-xs px-2 py-1 rounded-full">종료</span>'
                        : '<span class="bg-green-400 bg-opacity-80 text-white text-xs px-2 py-1 rounded-full">모집중</span>'}
                </div>
                <h3 class="text-white font-bold text-lg mt-2 leading-tight">${m.name}</h3>
            </div>
            <div class="p-5">
                <div class="space-y-2 text-sm text-gray-600 mb-4">
                    <div class="flex items-center gap-2"><i class="fas fa-calendar text-orange-400 w-4"></i>${m.date}</div>
                    <div class="flex items-center gap-2"><i class="fas fa-map-marker-alt text-orange-400 w-4"></i>${m.location || '장소 미정'}</div>
                    <div class="flex items-center gap-2"><i class="fas fa-won-sign text-orange-400 w-4"></i>${fee}</div>
                </div>
                <div class="flex gap-1 flex-wrap mb-4">
                    ${categories.map(cat => `<span class="bg-orange-50 text-orange-600 text-xs px-2 py-1 rounded-full font-medium">${cat}</span>`).join('')}
                </div>
                ${m.description ? `<p class="text-xs text-gray-400 mb-4 line-clamp-2">${m.description}</p>` : ''}
                <div class="flex gap-2">
                    ${officialLink}
                    ${!isPast
                        ? IS_LOGGED_IN
                            ? `<button onclick="openModal(${m.id}, '${m.name.replace(/'/g, "\\'")}', '${m.categories}')" class="flex-1 bg-orange-500 text-white rounded-lg py-2 text-sm font-semibold hover:bg-orange-600 transition-colors">참가 신청</button>`
                            : `<a href="/login" class="flex-1 border border-orange-300 text-orange-500 rounded-lg py-2 text-sm font-semibold hover:bg-orange-50 transition-colors text-center">로그인 후 신청</a>`
                        : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

function openModal(id, name, categories) {
    selectedMarathonId = id;
    document.getElementById('modal-marathon-name').textContent = name;
    const select = document.getElementById('reg-category');
    select.innerHTML = (categories || '').split(',').map(cat =>
        `<option value="${cat}">${categoryLabels[cat] || cat}</option>`
    ).join('');
    document.getElementById('modal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('modal').classList.add('hidden');
    document.getElementById('reg-name').value = '';
    document.getElementById('reg-email').value = '';
    selectedMarathonId = null;
}

async function submitRegistration() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const category = document.getElementById('reg-category').value;

    if (!name) { alert('이름을 입력해주세요.'); return; }

    const res = await fetch('/api/registrations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ marathon_id: selectedMarathonId, runner_name: name, email, category })
    });
    const data = await res.json();
    if (res.ok) {
        alert(data.message);
        closeModal();
    } else {
        alert(data.error);
    }
}

document.getElementById('filter-city').addEventListener('change', loadMarathons);
document.getElementById('filter-category').addEventListener('change', loadMarathons);
document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadMarathons, 300);
});
document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

loadCities().then(() => loadMarathons());
</script>
{{end}}
