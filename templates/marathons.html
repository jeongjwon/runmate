{{template "layout.html" .}}
{{define "content"}}
{{$loggedIn := ne .User nil}}

<div class="mb-6 flex flex-col gap-4">
    <h1 class="text-2xl font-extrabold flex items-center gap-2" style="color:var(--navy);">
        <i class="fas fa-flag-checkered" style="color:var(--mint);"></i>마라톤 일정
    </h1>

    <div class="flex flex-col sm:flex-row gap-2">
        <div class="relative flex-1">
            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-xs" style="color:var(--text3);"></i>
            <input id="search-input" type="text" placeholder="대회명 또는 장소 검색" class="input-dark pl-8">
        </div>
        <select id="filter-city" class="input-dark sm:w-40">
            <option value="">전국</option>
            <option value="서울특별시">서울특별시</option>
            <option value="부산광역시">부산광역시</option>
            <option value="대구광역시">대구광역시</option>
            <option value="인천광역시">인천광역시</option>
            <option value="광주광역시">광주광역시</option>
            <option value="대전광역시">대전광역시</option>
            <option value="울산광역시">울산광역시</option>
            <option value="세종특별자치도">세종특별자치도</option>
            <option value="경기도">경기도</option>
            <option value="강원특별자치도">강원특별자치도</option>
            <option value="충청북도">충청북도</option>
            <option value="충청남도">충청남도</option>
            <option value="전라북도">전라북도</option>
            <option value="전라남도">전라남도</option>
            <option value="경상북도">경상북도</option>
            <option value="경상남도">경상남도</option>
            <option value="제주특별자치도">제주특별자치도</option>
        </select>
        <select id="filter-category" class="input-dark sm:w-36">
            <option value="">전체 종목</option>
            <option value="5K">5K</option>
            <option value="10K">10K</option>
            <option value="Half">하프</option>
            <option value="Full">풀코스</option>
        </select>
        {{if $loggedIn}}
        <select id="filter-participation" class="input-dark sm:w-36">
            <option value="">전체 보기</option>
            <option value="yes">⭐ 내 마라톤</option>
        </select>
        {{end}}
    </div>
    <p id="result-count" class="text-sm" style="color:var(--text3);"></p>
</div>

<div id="marathon-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

<script>
const IS_LOGGED_IN = {{if $loggedIn}}true{{else}}false{{end}};
let searchTimer = null;
let participationMap = {};
let lastMarathons = [];
const pendingSet = new Set();

async function loadParticipations() {
    if (!IS_LOGGED_IN) return;
    const res = await fetch('/api/participations');
    const { data } = await res.json();
    participationMap = {};
    (data || []).forEach(p => { participationMap[p.marathon_id] = true; });
}

function toggleParticipation(marathonId, event) {
    event.stopPropagation();
    if (!IS_LOGGED_IN) { location.href = '/login'; return; }
    if (pendingSet.has(marathonId)) return;

    if (!!participationMap[marathonId]) {
        showConfirmModal(
            '내 마라톤에서 제거',
            '이 마라톤을 내 목록에서 제거할까요?',
            () => doRemove(marathonId)
        );
    } else {
        doAdd(marathonId);
    }
}

async function doAdd(marathonId) {
    if (pendingSet.has(marathonId)) return;
    pendingSet.add(marathonId);
    participationMap[marathonId] = true;
    updateParticipationBtn(marathonId);
    try {
        const res = await fetch(`/api/participations/${marathonId}`, { method: 'POST', credentials: 'same-origin' });
        if (res.ok) {
            showSnackbar('내 마라톤에 추가되었습니다 ⭐');
        } else {
            delete participationMap[marathonId];
            updateParticipationBtn(marathonId);
            showSnackbar('추가에 실패했습니다', 'error');
        }
    } finally {
        pendingSet.delete(marathonId);
    }
    const fp = document.getElementById('filter-participation');
    if (fp && fp.value) renderMarathons(lastMarathons);
}

async function doRemove(marathonId) {
    if (pendingSet.has(marathonId)) return;
    pendingSet.add(marathonId);
    delete participationMap[marathonId];
    updateParticipationBtn(marathonId);
    try {
        const res = await fetch(`/api/participations/${marathonId}`, { method: 'DELETE', credentials: 'same-origin' });
        if (res.ok) {
            showSnackbar('내 마라톤에서 제거되었습니다');
        } else {
            participationMap[marathonId] = true;
            updateParticipationBtn(marathonId);
            showSnackbar('제거에 실패했습니다', 'error');
        }
    } finally {
        pendingSet.delete(marathonId);
    }
    const fp = document.getElementById('filter-participation');
    if (fp && fp.value) renderMarathons(lastMarathons);
}

function updateParticipationBtn(marathonId) {
    const btn = document.getElementById(`btn-participation-${marathonId}`);
    if (!btn) return;
    const active = !!participationMap[marathonId];
    if (active) {
        btn.style.cssText = 'background-color:rgba(78,203,160,.12);border:1.5px solid rgba(78,203,160,.5);';
        btn.innerHTML = '<i class="fas fa-star" style="color:#4ECBA0;font-size:.9rem;"></i>';
        btn.title = '참여 취소';
    } else {
        btn.style.cssText = 'border:1.5px solid var(--border);background-color:var(--surface);';
        btn.innerHTML = '<i class="far fa-star" style="color:var(--text3);font-size:.9rem;"></i>';
        btn.title = '참여';
    }
}

const REGION_CENTROIDS = [
    { name: '서울특별시',     lat: 37.5665, lng: 126.9780 },
    { name: '부산광역시',     lat: 35.1796, lng: 129.0756 },
    { name: '대구광역시',     lat: 35.8714, lng: 128.6014 },
    { name: '인천광역시',     lat: 37.4563, lng: 126.7052 },
    { name: '광주광역시',     lat: 35.1595, lng: 126.8526 },
    { name: '대전광역시',     lat: 36.3504, lng: 127.3845 },
    { name: '울산광역시',     lat: 35.5384, lng: 129.3114 },
    { name: '세종특별자치도', lat: 36.4804, lng: 127.2890 },
    { name: '경기도',         lat: 37.4138, lng: 127.5183 },
    { name: '강원특별자치도', lat: 37.8228, lng: 128.1555 },
    { name: '충청북도',       lat: 36.6357, lng: 127.4917 },
    { name: '충청남도',       lat: 36.5184, lng: 126.8000 },
    { name: '전라북도',       lat: 35.7175, lng: 127.1530 },
    { name: '전라남도',       lat: 34.8161, lng: 126.4630 },
    { name: '경상북도',       lat: 36.4919, lng: 128.8889 },
    { name: '경상남도',       lat: 35.4606, lng: 128.2132 },
    { name: '제주특별자치도', lat: 33.4996, lng: 126.5312 },
];

function getNearestRegion(lat, lng) {
    let nearest = null, minDist = Infinity;
    for (const r of REGION_CENTROIDS) {
        const d = (lat - r.lat) ** 2 + (lng - r.lng) ** 2;
        if (d < minDist) { minDist = d; nearest = r.name; }
    }
    return nearest;
}

function requestLocation() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
        const region = getNearestRegion(pos.coords.latitude, pos.coords.longitude);
        const sel = document.getElementById('filter-city');
        if (sel) { sel.value = region; loadMarathons(); }
    });
}

async function loadMarathons() {
    const city     = document.getElementById('filter-city').value;
    const category = document.getElementById('filter-category').value;
    const search   = document.getElementById('search-input').value.trim();
    const params   = new URLSearchParams();
    if (city)     params.set('city', city);
    if (category) params.set('category', category);
    if (search)   params.set('search', search);

    const res = await fetch('/api/marathons' + (params.toString() ? '?' + params : ''));
    const { data } = await res.json();
    lastMarathons = data || [];
    renderMarathons(lastMarathons);
}

function renderMarathons(marathons) {
    const container = document.getElementById('marathon-list');
    const countEl   = document.getElementById('result-count');
    const fp        = document.getElementById('filter-participation');
    const filtered  = (fp && fp.value) ? marathons.filter(m => !!participationMap[m.id]) : marathons;

    countEl.textContent = `총 ${filtered.length}개 대회`;

    if (!filtered.length) {
        container.innerHTML = `
        <div class="col-span-3 text-center py-20" style="color:var(--text2);">
            <i class="fas fa-flag-checkered text-5xl mb-4 block opacity-20"></i>
            <p class="text-lg font-semibold">조건에 맞는 마라톤이 없습니다.</p>
        </div>`;
        return;
    }

    const today = new Date().toISOString().split('T')[0];
    container.innerHTML = filtered.map(m => {
        const categories = m.categories ? m.categories.split(',') : [];
        const isPast     = m.date < today;
        const fee        = m.entry_fee > 0 ? m.entry_fee.toLocaleString() + '원' : '미정';
        const active     = !!participationMap[m.id];

        const statusBadge = isPast
            ? '<span class="badge-gray">종료</span>'
            : '<span class="badge-mint" style="background-color:rgba(78,203,160,.2);">모집중</span>';

        const participationBtnStyle = active
            ? 'background-color:rgba(78,203,160,.15);border:1.5px solid rgba(78,203,160,.5);'
            : 'border:1.5px solid rgba(27,45,64,.15);background-color:rgba(27,45,64,.04);';
        const participationIcon = active
            ? '<i class="fas fa-star" style="color:#4ECBA0;font-size:.85rem;"></i>'
            : '<i class="far fa-star" style="color:#9AAAB8;font-size:.85rem;"></i>';
        const participationBtn = IS_LOGGED_IN ? `
            <button id="btn-participation-${m.id}"
                onclick="toggleParticipation(${m.id}, event)"
                title="${active ? '참여 취소' : '참여'}"
                style="${participationBtnStyle}"
                class="w-8 h-8 flex items-center justify-center rounded-lg transition-colors shrink-0">
                ${participationIcon}
            </button>` : '';

        const officialLink = m.official_url
            ? `<a href="${m.official_url}" target="_blank"
                class="btn-outline flex items-center justify-center gap-1.5 w-full py-2 text-xs font-semibold mt-3">
                <i class="fas fa-external-link-alt text-xs"></i> 공식 홈페이지
               </a>`
            : '';

        return `
        <div class="card card-hover overflow-hidden">
            <!-- 헤더: 연한 네이비 틴트 -->
            <div class="px-4 py-3.5 flex items-start justify-between gap-2" style="background-color:#EEF2F8;border-bottom:1px solid var(--border);">
                <div class="min-w-0 flex-1">
                    <h3 class="font-bold text-sm leading-snug mb-1.5" style="color:var(--navy);">${m.name}</h3>
                    <div class="flex items-center gap-1.5">
                        <span class="badge-mint">${m.city || '지역 미상'}</span>
                        ${statusBadge}
                    </div>
                </div>
                ${participationBtn}
            </div>
            <!-- 바디 -->
            <div class="px-4 py-3.5">
                <div class="text-xs space-y-1 mb-3" style="color:var(--text2);">
                    <div class="flex items-center gap-1.5">
                        <i class="fas fa-calendar w-3.5 text-center shrink-0" style="color:var(--mint);"></i>
                        <span>${m.date}</span>
                        <span class="mx-0.5" style="color:var(--border);">·</span>
                        <i class="fas fa-won-sign w-3.5 text-center shrink-0" style="color:var(--mint);"></i>
                        <span>${fee}</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <i class="fas fa-map-marker-alt w-3.5 text-center shrink-0" style="color:var(--mint);"></i>
                        <span class="truncate">${m.location || '장소 미정'}</span>
                    </div>
                </div>
                <div class="flex gap-1 flex-wrap">
                    ${categories.map(cat => `<span class="badge-mint">${cat}</span>`).join('')}
                </div>
                ${officialLink}
            </div>
        </div>`;
    }).join('');
}

document.getElementById('filter-city').addEventListener('change', loadMarathons);
document.getElementById('filter-category').addEventListener('change', loadMarathons);
document.getElementById('search-input').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadMarathons, 300);
});
const fp = document.getElementById('filter-participation');
if (fp) fp.addEventListener('change', () => renderMarathons(lastMarathons));

loadParticipations().then(() => {
    requestLocation();
    loadMarathons();
});
</script>
{{end}}
