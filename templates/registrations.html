{{template "layout.html" .}}
{{define "content"}}
<div class="mb-6">
    <h1 class="text-2xl font-extrabold flex items-center gap-2" style="color:var(--navy);">
        <i class="fas fa-star" style="color:var(--mint);"></i>내 마라톤
    </h1>
</div>

<div id="participation-list" class="space-y-3"></div>

<!-- 기록 입력 모달 -->
<div id="record-modal" class="fixed inset-0 modal-overlay hidden z-50 flex items-end sm:items-center justify-center p-4">
    <div class="modal-box w-full max-w-md rounded-2xl shadow-2xl">
        <div class="modal-header px-6 py-4 rounded-t-2xl flex justify-between items-center">
            <h2 class="text-base font-bold" style="color:var(--navy);">출전 기록 입력</h2>
            <button onclick="closeRecordModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[#F0EFEA] transition-colors" style="color:var(--text2);">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="p-6 space-y-4">
            <p class="font-bold" style="color:var(--mint);" id="record-marathon-name"></p>
            <input type="hidden" id="record-marathon-id">
            <div>
                <label class="block text-xs font-bold mb-1.5" style="color:var(--text2);">출전 종목</label>
                <select id="record-category" class="input-dark"></select>
            </div>
            <div>
                <label class="block text-xs font-bold mb-1.5" style="color:var(--text2);">완주 기록 (시 : 분 : 초)</label>
                <div class="flex gap-2 items-center">
                    <input id="rec-h" type="number" min="0" max="23" placeholder="0" class="input-dark text-center">
                    <span class="font-bold" style="color:var(--text3);">:</span>
                    <input id="rec-m" type="number" min="0" max="59" placeholder="00" class="input-dark text-center">
                    <span class="font-bold" style="color:var(--text3);">:</span>
                    <input id="rec-s" type="number" min="0" max="59" placeholder="00" class="input-dark text-center">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold mb-1.5" style="color:var(--text2);">메모</label>
                <textarea id="record-notes" rows="2" placeholder="날씨, 컨디션, 소감 등" class="input-dark resize-none"></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold mb-1.5" style="color:var(--text2);">기록증 사진</label>
                <div id="cert-preview-wrap" class="hidden mb-2 relative">
                    <img id="cert-preview" src="" class="w-full rounded-xl object-cover max-h-44 border" style="border-color:var(--border);">
                    <button onclick="removeCertPreview()" class="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center text-white text-xs" style="background-color:rgba(0,0,0,.5);">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <label for="cert-file" class="flex items-center justify-center gap-2 w-full py-3.5 rounded-xl cursor-pointer border-2 border-dashed transition-colors hover:opacity-80" style="border-color:var(--border);">
                    <i class="fas fa-camera" style="color:var(--text3);"></i>
                    <span class="text-sm font-semibold" style="color:var(--text3);">사진 추가 (JPG·PNG·WEBP, 최대 5MB)</span>
                </label>
                <input id="cert-file" type="file" accept="image/jpeg,image/png,image/webp" class="hidden" onchange="previewCert(this)">
            </div>
        </div>
        <div class="px-6 pb-6 flex gap-3">
            <button onclick="closeRecordModal()" class="btn-outline flex-1 py-2.5 text-sm font-bold">취소</button>
            <button onclick="saveRecord()" class="btn-mint flex-1 justify-center py-2.5 text-sm">저장</button>
        </div>
    </div>
</div>

<script>
const categoryLabels = { '5K':'5K', '10K':'10K', 'Half':'하프 (21.1km)', 'Full':'풀코스 (42.195km)' };
let participationsData = {}; // marathon_id → participation 객체
let certFile = null;
let certRemoved = false;

async function loadParticipations() {
    const res = await fetch('/api/participations');
    const { data } = await res.json();
    participationsData = {};
    (data || []).forEach(p => { participationsData[p.marathon_id] = p; });
    renderParticipations(data || []);
}

function formatTime(sec) {
    if (!sec) return null;
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
}

function renderParticipations(participations) {
    const container = document.getElementById('participation-list');
    if (!participations.length) {
        container.innerHTML = `
        <div class="text-center py-24" style="color:var(--text2);">
            <i class="fas fa-star text-6xl mb-4 block opacity-10" style="color:var(--mint);"></i>
            <p class="text-lg font-bold" style="color:var(--navy);">참여한 마라톤이 없어요</p>
            <p class="text-sm mt-1" style="color:var(--text2);">마라톤 목록에서 ⭐를 눌러 추가해보세요</p>
            <a href="/" class="btn-mint inline-flex mt-5 px-6 py-2.5">마라톤 보러 가기</a>
        </div>`;
        return;
    }

    container.innerHTML = participations.map(p => {
        const m    = p.marathon || {};
        const time = formatTime(p.finish_time);

        return `
        <div class="card card-hover p-5">
            <div class="flex items-start justify-between gap-4">
                <div class="flex items-center gap-4 flex-1 min-w-0">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background-color:rgba(78,203,160,.12);">
                        <i class="fas fa-star text-xl" style="color:var(--mint);"></i>
                    </div>
                    <div class="min-w-0">
                        <h3 class="font-bold truncate" style="color:var(--navy);">${m.name || '-'}</h3>
                        <p class="text-sm mt-0.5" style="color:var(--text2);">
                            <span class="mr-3"><i class="fas fa-calendar mr-1" style="color:var(--mint);"></i>${m.date || '-'}</span>
                            <span><i class="fas fa-map-marker-alt mr-1" style="color:var(--mint);"></i>${m.location || '-'}</span>
                        </p>
                        ${p.category || time ? `
                        <div class="flex flex-wrap gap-2 mt-2">
                            ${p.category ? `<span class="badge-mint">${categoryLabels[p.category] || p.category}</span>` : ''}
                            ${time ? `<span style="background-color:rgba(59,130,246,.1);color:#3b82f6;border-radius:9999px;padding:.15rem .6rem;font-size:.72rem;font-weight:700;"><i class="fas fa-stopwatch mr-1"></i>${time}</span>` : ''}
                            ${p.race_notes ? `<span class="text-xs self-center truncate max-w-[180px]" style="color:var(--text3);">${p.race_notes}</span>` : ''}
                        </div>
                        ${p.certificate_url ? `
                        <a href="${p.certificate_url}" download class="inline-flex items-center gap-1.5 mt-2 px-2.5 py-1 rounded-lg text-xs font-bold transition-opacity hover:opacity-70" style="background-color:rgba(59,130,246,.1);color:#3b82f6;">
                            <i class="fas fa-download"></i>기록증 다운로드
                        </a>` : ''}` : `
                        <p class="text-xs mt-1.5" style="color:var(--text3);">출전 기록이 없습니다</p>`}
                    </div>
                </div>
                <div class="flex flex-col gap-2 shrink-0">
                    <button onclick="openRecordModal(${p.marathon_id})"
                        class="btn-mint text-xs px-3 py-1.5 rounded-lg whitespace-nowrap justify-center">
                        <i class="fas fa-pen"></i>기록 ${p.category || p.finish_time ? '수정' : '입력'}
                    </button>
                    <button onclick="removeParticipation(${p.marathon_id}, '${(m.name||'').replace(/'/g,"\\'")}')"
                        class="btn-outline text-xs px-3 py-1.5 rounded-lg w-full text-center">
                        목록에서 제거
                    </button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function removeParticipation(marathonId, name) {
    showConfirmModal(
        '내 마라톤에서 제거',
        `'${name}'을(를) 목록에서 제거할까요?`,
        async () => {
            const res = await fetch(`/api/participations/${marathonId}`, {
                method: 'DELETE',
                credentials: 'same-origin',
            });
            if (res.ok) {
                showSnackbar('내 마라톤에서 제거되었습니다');
                loadParticipations();
            } else {
                showSnackbar('제거에 실패했습니다', 'error');
            }
        }
    );
}

function openRecordModal(marathonId) {
    const p = participationsData[marathonId] || {};
    const m = p.marathon || {};
    document.getElementById('record-marathon-id').value = marathonId;
    document.getElementById('record-marathon-name').textContent = m.name || '';

    // 종목 셀렉트
    const sel = document.getElementById('record-category');
    sel.innerHTML = '<option value="">선택 안함</option>' +
        (m.categories||'').split(',').filter(Boolean).map(cat =>
            `<option value="${cat}" ${p.category === cat ? 'selected' : ''}>${categoryLabels[cat]||cat}</option>`
        ).join('');

    // 완주 기록 (초 → H/M/S)
    if (p.finish_time > 0) {
        const h = Math.floor(p.finish_time / 3600);
        const min = Math.floor((p.finish_time % 3600) / 60);
        const s = p.finish_time % 60;
        document.getElementById('rec-h').value = h || '';
        document.getElementById('rec-m').value = min || '';
        document.getElementById('rec-s').value = s || '';
    } else {
        ['rec-h','rec-m','rec-s'].forEach(id => document.getElementById(id).value = '');
    }

    document.getElementById('record-notes').value = p.race_notes || '';

    // 기록증 초기화
    certFile = null;
    certRemoved = false;
    document.getElementById('cert-file').value = '';
    if (p.certificate_url) {
        document.getElementById('cert-preview').src = p.certificate_url;
        document.getElementById('cert-preview-wrap').classList.remove('hidden');
    } else {
        document.getElementById('cert-preview').src = '';
        document.getElementById('cert-preview-wrap').classList.add('hidden');
    }

    document.getElementById('record-modal').classList.remove('hidden');
}

function previewCert(input) {
    if (!input.files || !input.files[0]) return;
    certFile = input.files[0];
    certRemoved = false;
    const reader = new FileReader();
    reader.onload = e => {
        document.getElementById('cert-preview').src = e.target.result;
        document.getElementById('cert-preview-wrap').classList.remove('hidden');
    };
    reader.readAsDataURL(certFile);
}

function removeCertPreview() {
    certFile = null;
    certRemoved = true;
    document.getElementById('cert-file').value = '';
    document.getElementById('cert-preview').src = '';
    document.getElementById('cert-preview-wrap').classList.add('hidden');
}

function closeRecordModal() { document.getElementById('record-modal').classList.add('hidden'); }

async function saveRecord() {
    const marathonId = document.getElementById('record-marathon-id').value;
    const category   = document.getElementById('record-category').value;
    const h = parseInt(document.getElementById('rec-h').value) || 0;
    const m = parseInt(document.getElementById('rec-m').value) || 0;
    const s = parseInt(document.getElementById('rec-s').value) || 0;
    const finishTime = h||m||s ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}` : '';
    const notes = document.getElementById('record-notes').value;

    // 기록증 업로드 (새 파일이 있을 때)
    if (certFile) {
        const fd = new FormData();
        fd.append('certificate', certFile);
        const cr = await fetch(`/api/participations/${marathonId}/certificate`, { method: 'POST', body: fd });
        if (!cr.ok) {
            const cd = await cr.json();
            showSnackbar(cd.error || '기록증 업로드 실패', 'error');
            return;
        }
    }

    const res = await fetch(`/api/participations/${marathonId}/record`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ category, finish_time: finishTime, race_notes: notes })
    });
    const data = await res.json();
    if (res.ok) { closeRecordModal(); loadParticipations(); showSnackbar('기록이 저장되었습니다'); }
    else        { showSnackbar(data.error || '저장에 실패했습니다', 'error'); }
}

document.getElementById('record-modal').addEventListener('click', function(e) {
    if (e.target === this) closeRecordModal();
});

loadParticipations();
</script>
{{end}}
