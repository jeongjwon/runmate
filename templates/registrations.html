{{template "layout.html" .}}
{{define "content"}}
<div class="mb-6 flex items-center justify-between">
    <h1 class="text-2xl font-bold text-gray-800"><i class="fas fa-ticket text-orange-500 mr-2"></i>내 마라톤 신청</h1>
</div>

<div id="reg-list" class="space-y-4"></div>

<script>
const statusLabels = { registered: '신청완료', cancelled: '취소됨', completed: '완료' };
const statusColors = {
    registered: 'bg-green-100 text-green-700',
    cancelled: 'bg-gray-100 text-gray-500',
    completed: 'bg-blue-100 text-blue-700'
};

async function loadRegistrations() {
    const res = await fetch('/api/registrations');
    const { data } = await res.json();
    renderList(data || []);
}

function renderList(regs) {
    const container = document.getElementById('reg-list');
    if (!regs.length) {
        container.innerHTML = `
        <div class="text-center py-20 text-gray-400">
            <i class="fas fa-ticket text-5xl mb-4 block"></i>
            <p class="text-lg">아직 신청한 마라톤이 없습니다.</p>
            <a href="/marathons" class="mt-4 inline-block bg-orange-500 text-white px-6 py-2 rounded-lg hover:bg-orange-600 transition-colors">
                마라톤 보러 가기
            </a>
        </div>`;
        return;
    }
    container.innerHTML = regs.map(r => `
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 flex items-center justify-between card-hover ${r.status === 'cancelled' ? 'opacity-60' : ''}">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center text-orange-500 text-xl">
                <i class="fas fa-running"></i>
            </div>
            <div>
                <h3 class="font-bold text-gray-800">${r.marathon?.name || '마라톤 ' + r.marathon_id}</h3>
                <p class="text-sm text-gray-500 mt-0.5">
                    <span class="mr-3"><i class="fas fa-calendar mr-1"></i>${r.marathon?.date || '-'}</span>
                    <span class="mr-3"><i class="fas fa-map-marker-alt mr-1"></i>${r.marathon?.location || '-'}</span>
                    <span class="mr-3"><i class="fas fa-person-running mr-1"></i>${r.runner_name}</span>
                    <span><i class="fas fa-route mr-1"></i>${r.category}</span>
                </p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="px-3 py-1 rounded-full text-sm font-medium ${statusColors[r.status] || 'bg-gray-100 text-gray-500'}">
                ${statusLabels[r.status] || r.status}
            </span>
            ${r.status === 'registered' ? `
            <button onclick="cancelRegistration(${r.id})" class="text-red-400 hover:text-red-600 transition-colors text-sm border border-red-200 hover:border-red-400 rounded-lg px-3 py-1">
                취소
            </button>` : ''}
        </div>
    </div>`).join('');
}

async function cancelRegistration(id) {
    if (!confirm('참가 신청을 취소하시겠습니까?')) return;
    const res = await fetch('/api/registrations/' + id, { method: 'DELETE' });
    const data = await res.json();
    alert(data.message);
    loadRegistrations();
}

loadRegistrations();
</script>
{{end}}
