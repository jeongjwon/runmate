{{template "layout.html" .}}
{{define "content"}}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<input id="csv-file-input" type="file" accept=".csv" class="hidden" onchange="handleCSVFile(this)">
<input id="tcx-file-input" type="file" accept=".tcx" class="hidden" onchange="handleTCXFile(this)">

<style>
.act-tab {
  padding: .45rem 1.1rem;
  font-size: .8125rem;
  font-weight: 700;
  border-radius: 9999px;
  color: var(--text2);
  cursor: pointer;
  background: transparent;
  border: none;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.act-tab:hover { background: var(--surface2); color: var(--navy); }
.act-tab.active { background: var(--navy); color: #fff; }
.act-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: .875rem;
  transition: box-shadow .15s, transform .15s;
}
.act-card:hover { box-shadow: 0 4px 20px rgba(27,45,64,.09); transform: translateY(-1px); }
.nav-ghost { background:transparent; border:none; cursor:pointer; padding:.5rem; border-radius:9999px; transition: background .15s; }
.nav-ghost:hover { background: var(--surface2); }
.nav-ghost:disabled { opacity: .3; cursor: default; }
.nav-ghost:disabled:hover { background: transparent; }
</style>

<!-- ═══ 기간 탭 헤더 (sticky) ═══ -->
<div class="-mx-4 -mt-6 sticky top-14 z-20" style="background:var(--surface); border-bottom:1px solid var(--border);">
  <div class="max-w-5xl mx-auto px-4 py-2.5 flex justify-center">
    <div class="flex gap-1 p-1 rounded-2xl" style="background:var(--surface2);">
      <button id="tab-week"  class="act-tab" onclick="selectTab('week')">주</button>
      <button id="tab-month" class="act-tab" onclick="selectTab('month')">월</button>
      <button id="tab-year"  class="act-tab" onclick="selectTab('year')">년</button>
      <button id="tab-all"   class="act-tab" onclick="selectTab('all')">전체</button>
    </div>
  </div>
</div>

<!-- ═══ 통계 + 차트 ═══ -->
<div class="-mx-4" style="background:var(--surface); border-bottom:1px solid var(--border);">
  <div class="max-w-5xl mx-auto px-4 pt-4 pb-5">

    <!-- 기간 네비게이터 -->
    <div class="flex items-center justify-between mb-4" style="min-height:2rem;">
      <button id="prev-btn" class="nav-ghost" onclick="prevPeriod()" style="color:var(--text3);">
        <i class="fas fa-chevron-left text-xs"></i>
      </button>
      <span id="period-label" style="font-size:.875rem; font-weight:600; color:var(--text2);"></span>
      <button id="next-btn" class="nav-ghost" onclick="nextPeriod()" style="color:var(--text3);">
        <i class="fas fa-chevron-right text-xs"></i>
      </button>
    </div>

    <!-- 통계(좌) + 차트(우) — 데스크톱 1:1, 모바일 세로 -->
    <div class="flex flex-col sm:flex-row sm:items-stretch gap-4 sm:gap-8">

      <!-- 왼쪽: 통계 -->
      <div class="flex-1">
        <!-- 메인 거리 -->
        <div class="mb-4">
          <div class="flex items-end gap-2" style="line-height:1;">
            <span id="stat-distance" style="font-size:clamp(3rem,10vw,4.5rem); font-weight:800; letter-spacing:-.02em; line-height:1; color:var(--navy);">0</span>
            <span style="font-size:1.125rem; font-weight:400; color:var(--text3); margin-bottom:.3rem;">km</span>
          </div>
          <div style="font-size:.625rem; color:var(--text3); letter-spacing:.1em; text-transform:uppercase; margin-top:.4rem;">총 거리</div>
        </div>

        <!-- 서브 통계 3개 -->
        <div class="grid grid-cols-3" style="border:1px solid var(--border); border-radius:.875rem; overflow:hidden; background:var(--surface2);">
          <div class="py-3 text-center" style="border-right:1px solid var(--border);">
            <div id="stat-count" style="font-size:1.125rem; font-weight:700; color:var(--navy);">0</div>
            <div style="font-size:.625rem; color:var(--text3); margin-top:.25rem;">러닝</div>
          </div>
          <div class="py-3 text-center" style="border-right:1px solid var(--border);">
            <div id="stat-pace" style="font-size:1.125rem; font-weight:700; color:var(--navy);">—</div>
            <div style="font-size:.625rem; color:var(--text3); margin-top:.25rem;">평균 페이스</div>
          </div>
          <div class="py-3 text-center">
            <div id="stat-time" style="font-size:1.125rem; font-weight:700; color:var(--navy);">0:00</div>
            <div style="font-size:.625rem; color:var(--text3); margin-top:.25rem;">시간</div>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 차트 -->
      <div class="flex-1" style="min-height:130px; position:relative;">
        <div id="chart-wrap" style="position:absolute; inset:0;">
          <canvas id="activity-chart"></canvas>
        </div>
        <div id="chart-empty" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; font-size:.8125rem; color:var(--text3);">이 기간에 기록이 없습니다</div>
      </div>

    </div>
  </div>
</div>

<!-- ═══ 모든 활동 리스트 ═══ -->
<div class="mt-5">
  <div class="flex items-center justify-between mb-3">
    <div class="flex items-center gap-2">
      <h2 style="font-size:.75rem; font-weight:800; color:var(--text2); text-transform:uppercase; letter-spacing:.08em;">모든 활동</h2>
      <span id="all-count-badge" style="color:var(--text3); font-size:.75rem; font-weight:600;"></span>
    </div>
    <div class="flex gap-1.5">
      <label for="csv-file-input" title="CSV 가져오기" class="btn-outline px-2.5 py-1.5 text-xs font-bold cursor-pointer flex items-center gap-1">
        <i class="fas fa-file-csv"></i><span class="hidden sm:inline"> CSV</span>
      </label>
      <label for="tcx-file-input" title="TCX 가져오기" class="btn-outline px-2.5 py-1.5 text-xs font-bold cursor-pointer flex items-center gap-1">
        <i class="fas fa-route"></i><span class="hidden sm:inline"> TCX</span>
      </label>
      <button onclick="openAddModal()" class="btn-mint px-3 py-1.5 text-xs">
        <i class="fas fa-plus"></i><span class="hidden sm:inline"> 기록 추가</span>
      </button>
    </div>
  </div>
  <div id="records-list" class="space-y-2.5"></div>
  <div id="empty-state" class="hidden text-center" style="padding:3rem 0;">
    <i class="fas fa-person-running" style="font-size:3rem; color:var(--border); display:block; margin-bottom:1rem;"></i>
    <p style="font-weight:700; color:var(--text2);">아직 기록이 없습니다</p>
    <p style="font-size:.875rem; color:var(--text3); margin-top:.25rem; margin-bottom:1rem;">첫 러닝 기록을 추가해보세요</p>
    <button onclick="openAddModal()" class="btn-mint"><i class="fas fa-plus text-sm"></i> 기록 추가</button>
  </div>
</div>

<!-- ═══ 기록 추가/수정 모달 ═══ -->
<div id="modal" class="fixed inset-0 modal-overlay hidden z-50 flex items-end sm:items-center justify-center">
  <div class="modal-box w-full sm:max-w-lg sm:rounded-2xl rounded-t-2xl shadow-2xl max-h-[92vh] overflow-y-auto">

      <div class="grid grid-cols-2 gap-3">

          <input id="rec-date" type="date" class="input-dark">
        </div>
        <div>
          <label class="block text-xs font-bold mb-1.5" style="color:var(--text2);">코스 유형</label>

            <option value="road">🛣️ 로드</option>
            <option value="trail">🌲 트레일</option>
            <option value="track">🏟️ 트랙</option>
            <option value="treadmill">🏃 러닝머신</option>

      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>

          <input id="rec-distance" type="number" step="0.01" placeholder="5.00" class="input-dark">
        </div>

            <span class="font-bold" style="color:var(--text3);">:</span>
            <input id="rec-dur-s" type="number" min="0" max="59" placeholder="00" class="input-dark text-center px-1">
          </div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">

            <option value="">선택</option>
            <option value="sunny">☀️ 맑음</option>
            <option value="cloudy">☁️ 흐림</option>
            <option value="rainy">🌧️ 비</option>
            <option value="snowy">❄️ 눈</option>

          </select>

        <textarea id="rec-notes" rows="2" placeholder="오늘 러닝 어땠나요?" class="input-dark resize-none"></textarea>
      </div>
    </div>
    <div class="px-5 pb-5 flex gap-3">
      <button onclick="closeModal()" class="btn-outline flex-1 py-2.5 text-sm font-bold">취소</button>
      <button onclick="saveRecord()" class="btn-mint flex-1 justify-center py-2.5 text-sm">저장</button>
    </div>
  </div>
</div>

<!-- ═══ CSV 가져오기 모달 ═══ -->

<!-- ═══ 경로 보기 모달 ═══ -->
<div id="route-modal" class="fixed inset-0 modal-overlay hidden z-50 flex items-center justify-center p-4">
  <div class="modal-box w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden">
    <div class="modal-header px-5 py-3.5 flex justify-between items-center">
      <h2 id="route-modal-title" class="text-sm font-bold" style="color:var(--navy);"></h2>
      <button onclick="closeRouteModal()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[#F0EFEA]" style="color:var(--text2);"><i class="fas fa-times"></i></button>
    </div>
    <div id="route-map" style="height:60vh;min-height:320px;width:100%;z-index:1;"></div>
  </div>
</div>

<script>
// ── 상수 ──────────────────────────────────────────────────────
const weatherEmoji = { sunny:'☀️', cloudy:'☁️', rainy:'🌧️', snowy:'❄️', windy:'💨' };
const routeLabels  = { road:'로드', trail:'트레일', track:'트랙', treadmill:'러닝머신' };

// ── 상태 ──────────────────────────────────────────────────────
let allRecords      = [];
let currentTab      = 'month';
let periodOptions   = [];
let periodIdx       = 0;
let actChart        = null;
let tcxFile         = null;
let tcxMapInst      = null;
let routeMapInst    = null;
let csvParsed       = null;
const routeDataMap  = {};

// ── 유틸 ──────────────────────────────────────────────────────
function fmtHMS(sec) {
    if (!sec) return '0:00';
    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
    return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
        : `${m}:${String(s).padStart(2,'0')}`;
}

function paceStr(distKm, durSec) {
    if (!distKm || !durSec) return '—';
    const spk = durSec / distKm;
    return `${Math.floor(spk/60)}'${String(Math.round(spk%60)).padStart(2,'0')}"`;
}

function getMonday(date) {
    const d = new Date(date);
    const day = d.getDay();
    d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
    d.setHours(0, 0, 0, 0);
    return d;
}

function toDateStr(d) { return d.toISOString().split('T')[0]; }

// ── 기간 옵션 빌드 ─────────────────────────────────────────────
function buildPeriodOptions() {
    const now = new Date();
    switch (currentTab) {
        case 'week': {
            const mon = getMonday(now);
            periodOptions = Array.from({length:5}, (_,i) => {
                const monday = new Date(mon); monday.setDate(monday.getDate() - i*7);
                const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
                return { type:'week', monday, sunday };
            });
            break;
        }
        case 'month': {
            const cur = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const s = new Set([cur]);
            allRecords.forEach(r => s.add(r.date.slice(0,7)));
            periodOptions = Array.from(s).sort().reverse().map(ym => ({ type:'month', ym }));
            break;
        }
        case 'year': {
            const cur = String(now.getFullYear());
            const s = new Set([cur]);
            allRecords.forEach(r => s.add(r.date.slice(0,4)));
            periodOptions = Array.from(s).sort().reverse().map(yr => ({ type:'year', year:yr }));
            break;
        }
        case 'all':
            periodOptions = [{ type:'all' }];
            break;
    }
}

function periodKey(p) {
    if (!p) return null;
    switch (p.type) {
        case 'week':  return toDateStr(p.monday);
        case 'month': return p.ym;
        case 'year':  return p.year;
        case 'all':   return 'all';
    }
    return null;
}

function restorePeriod(key) {
    if (!key) { periodIdx = 0; return; }
    const i = periodOptions.findIndex(p => periodKey(p) === key);
    periodIdx = i >= 0 ? i : 0;
}

function getPeriodLabel(p) {
    if (!p) return '';
    switch (p.type) {
        case 'week': {
            const m1 = p.monday, s = p.sunday;
            if (m1.getMonth() === s.getMonth())
                return `${m1.getMonth()+1}월 ${m1.getDate()}일 – ${s.getDate()}일`;
            return `${m1.getMonth()+1}월 ${m1.getDate()}일 – ${s.getMonth()+1}월 ${s.getDate()}일`;
        }
        case 'month': { const [y,m] = p.ym.split('-'); return `${y}년 ${parseInt(m)}월`; }
        case 'year':  return `${p.year}년`;
        case 'all':   return '전체';
    }
    return '';
}

// ── 기록 필터링 ────────────────────────────────────────────────
function filterRecords(p) {
    if (!p || p.type === 'all') return allRecords;
    switch (p.type) {
        case 'week':  return allRecords.filter(r => r.date >= toDateStr(p.monday) && r.date <= toDateStr(p.sunday));
        case 'month': return allRecords.filter(r => r.date.startsWith(p.ym));
        case 'year':  return allRecords.filter(r => r.date.startsWith(p.year));
    }
    return allRecords;
}

// ── 통계 계산 ──────────────────────────────────────────────────
function computeStats(records) {
    const dist = records.reduce((s,r) => s + r.distance, 0);
    const sec  = records.reduce((s,r) => s + r.duration, 0);
    return { count: records.length, dist, time: fmtHMS(sec), pace: paceStr(dist, sec) };
}

function renderStats(st) {
    document.getElementById('stat-distance').textContent = st.dist > 0 ? st.dist.toFixed(1) : '0';
    document.getElementById('stat-count').textContent    = st.count;
    document.getElementById('stat-pace').textContent     = st.pace;
    document.getElementById('stat-time').textContent     = st.count > 0 ? st.time : '0:00';
}

// ── 차트 데이터 빌드 ───────────────────────────────────────────
function buildChartData(p) {
    if (!p) return null;
    switch (p.type) {
        case 'week': {
            const labels = ['월','화','수','목','금','토','일'];
            const data   = [0,0,0,0,0,0,0];
            const monT   = p.monday.getTime();
            allRecords.forEach(r => {
                const diff = Math.round((new Date(r.date+'T00:00:00').getTime() - monT) / 86400000);
                if (diff >= 0 && diff <= 6) data[diff] += r.distance;
            });
            return { labels, data };
        }
        case 'month': {
            const [y,mo] = p.ym.split('-').map(Number);
            const days   = new Date(y, mo, 0).getDate();
            const labels = Array.from({length:days}, (_,i) => String(i+1));
            const data   = Array(days).fill(0);
            allRecords.forEach(r => {
                if (r.date.startsWith(p.ym)) {
                    const d = parseInt(r.date.slice(8,10)) - 1;
                    if (d >= 0 && d < days) data[d] += r.distance;
                }
            });
            return { labels, data };
        }
        case 'year': {
            const labels = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
            const data   = Array(12).fill(0);
            allRecords.forEach(r => {
                if (r.date.startsWith(p.year)) data[parseInt(r.date.slice(5,7))-1] += r.distance;
            });
            return { labels, data };
        }
        case 'all': {
            const ymap = {};
            allRecords.forEach(r => { const y = r.date.slice(0,4); ymap[y] = (ymap[y]||0) + r.distance; });
            const years = Object.keys(ymap).sort();
            if (!years.length) return null;
            return { labels: years.map(y => y+'년'), data: years.map(y => ymap[y]) };
        }
    }
    return null;
}

function renderChart(cd) {
    const wrap  = document.getElementById('chart-wrap');
    const empty = document.getElementById('chart-empty');
    if (actChart) { actChart.destroy(); actChart = null; }

    const hasData = cd && cd.data.some(v => v > 0);
    if (!hasData) {
        wrap.style.display = 'none';
        empty.style.display = 'flex';
        return;
    }
    wrap.style.display = 'block';
    empty.style.display = 'none';

    const maxV  = Math.max(...cd.data);
    const colors = cd.data.map(v => v === maxV && v > 0 ? '#4ECBA0' : 'rgba(78,203,160,.35)');

    actChart = new Chart(document.getElementById('activity-chart'), {
        type: 'bar',
        data: {
            labels: cd.labels,
            datasets: [{ data: cd.data, backgroundColor: colors, borderRadius: { topLeft:4, topRight:4 }, borderSkipped:'bottom' }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(27,45,64,.92)',
                    titleColor: '#9aaab8',
                    bodyColor: '#fff',
                    padding: 10,
                    cornerRadius: 8,
                    displayColors: false,
                    callbacks: { label: ctx => `${ctx.raw.toFixed(1)} km` }
                }
            },
            scales: {
                x: {
                    grid: { display: false },
                    border: { display: false },
                    ticks: { color:'#9aaab8', font:{ size:10 }, maxTicksLimit:12, autoSkip:true }
                },
                y: {
                    beginAtZero: true,
                    grid: { color:'rgba(27,45,64,.05)' },
                    border: { display: false },
                    ticks: { display: false }
                }
            }
        }
    });
}

// ── 네비게이션 ────────────────────────────────────────────────
function updateNavButtons() {
    const prev = document.getElementById('prev-btn');
    const next = document.getElementById('next-btn');
    if (currentTab === 'all') {
        prev.style.visibility = 'hidden';
        next.style.visibility = 'hidden';
    } else {
        prev.disabled = periodIdx >= periodOptions.length - 1;
        next.disabled = periodIdx <= 0;
        prev.style.visibility = 'visible';
        next.style.visibility = 'visible';
    }
}

function prevPeriod() { if (periodIdx < periodOptions.length - 1) { periodIdx++; updateView(); } }
function nextPeriod() { if (periodIdx > 0) { periodIdx--; updateView(); } }

// ── 뷰 갱신 ───────────────────────────────────────────────────
function updateView() {
    const p = periodOptions[periodIdx];
    document.getElementById('period-label').textContent = getPeriodLabel(p);
    updateNavButtons();
    const filtered = filterRecords(p);
    renderStats(computeStats(filtered));
    renderChart(buildChartData(p));
}

// ── TCX 가져오기 ───────────────────────────────────────────────
function handleTCXFile(input) {
    if (!input.files||!input.files[0]) return;
    tcxFile = input.files[0];
    const reader = new FileReader();
    reader.onload = e => {
        try {
            const parsed = parseTCXClientSide(e.target.result);
            if (!parsed) { showSnackbar('TCX에서 활동 데이터를 찾을 수 없습니다','error'); return; }
            showTCXModal(parsed);
        } catch(err) { showSnackbar('TCX 파싱 실패: '+err.message,'error'); }
    };
    reader.readAsText(tcxFile,'UTF-8');
    input.value = '';
}

function parseTCXClientSide(xmlText) {
    const doc = new DOMParser().parseFromString(xmlText,'application/xml');
    const get = (el,tag) => { const n=el.getElementsByTagName(tag)[0]; return n?n.textContent.trim():''; };
    const laps = Array.from(doc.getElementsByTagName('Lap'));
    if (!laps.length) return null;
    let totalTimeSec=0, totalDistM=0, totalCal=0, hrSum=0, hrCount=0;
    const routePoints=[];
    laps.forEach(lap => {
        totalTimeSec += parseFloat(get(lap,'TotalTimeSeconds'))||0;
        totalDistM   += parseFloat(get(lap,'DistanceMeters'))||0;
        totalCal     += parseInt(get(lap,'Calories'))||0;
        Array.from(lap.getElementsByTagName('Trackpoint')).forEach((tp,i) => {
            const hrBpm = tp.getElementsByTagName('HeartRateBpm')[0];
            if (hrBpm) { const v=parseInt(get(hrBpm,'Value'))||0; if(v>0){hrSum+=v;hrCount++;} }
            if (i%5===0) {
                const pos=tp.getElementsByTagName('Position')[0];
                if (pos) { const lat=parseFloat(get(pos,'LatitudeDegrees')),lng=parseFloat(get(pos,'LongitudeDegrees')); if(lat&&lng) routePoints.push([lat,lng]); }
            }
        });
    });
    const distKm=totalDistM/1000, durSec=Math.round(totalTimeSec), avgHR=hrCount>0?Math.round(hrSum/hrCount):0;
    let date=new Date().toISOString().split('T')[0];
    const idEl=doc.getElementsByTagName('Id')[0];
    if (idEl) { try { date=new Date(new Date(idEl.textContent.trim()).getTime()+9*3600*1000).toISOString().split('T')[0]; } catch(e){} }
    const spk=durSec/distKm;
    const pace=distKm>0?`${Math.floor(spk/60)}'${String(Math.round(spk%60)).padStart(2,'0')}"`:'-';
    const h=Math.floor(durSec/3600),m=Math.floor((durSec%3600)/60),s=durSec%60;
    return { date, distKm, durSec, durationStr:`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`, avgHR, totalCal, pace, routePoints };
}

    document.getElementById('tcx-hr').textContent    = p.avgHR?p.avgHR+' bpm':'-';

// ── CSV 가져오기 ───────────────────────────────────────────────
function handleCSVFile(input) {
    if (!input.files||!input.files[0]) return;
    const file=input.files[0];
    const reader=new FileReader();
    reader.onload = e => {
        try {
            const p=parseRunningCSV(e.target.result,file.name);
            if (!p) { showSnackbar('Summary 행을 찾을 수 없습니다','error'); return; }
            csvParsed=p; showCSVModal(p);
        } catch(err) { showSnackbar('CSV 파싱 실패: '+err.message,'error'); }
    };
    reader.readAsText(file,'UTF-8');
    input.value='';
}

function parseCSVLine(line) {
    const r=[]; let cur='',inQ=false;
    for (const c of line) { if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){r.push(cur.trim());cur='';}else{cur+=c;} }
    r.push(cur.trim()); return r;
}

function parseRunningCSV(text, filename) {
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if (lines.length<2) return null;
    const headers=parseCSVLine(lines[0]);
    let row=null;
    for (let i=1;i<lines.length;i++) { const cols=parseCSVLine(lines[i]); if(cols[0]==='Summary'){row=cols;break;} }
    if (!row) return null;
    const get=name=>{ const i=headers.indexOf(name); return i>=0?(row[i]||'').trim():''; };
    const dist=parseFloat(get('GetDistance'))||0;
    const timeStr=get('Time');
    const parts=timeStr.split(':').map(Number);
    const durSec=parts.length===3?parts[0]*3600+parts[1]*60+parts[2]:parts.length===2?parts[0]*60+parts[1]:0;
    const hr=parseInt(get('Avg HR'))||0, cal=parseInt(get('Calories'))||0;
    const m=filename.match(/(\d{4})(\d{2})(\d{2})\d+/);
    const date=m?`${m[1]}-${m[2]}-${m[3]}`:new Date().toISOString().split('T')[0];
    let pace='-';
    if (dist>0&&durSec>0){const spk=durSec/dist;pace=`${Math.floor(spk/60)}'${String(Math.round(spk%60)).padStart(2,'0')}"`;}
    return { date, dist, timeStr:timeStr.trim(), durSec, hr, cal, pace };
}

function showCSVModal(p) {
    document.getElementById('csv-date-display').textContent=p.date;
    document.getElementById('csv-dist-display').textContent=p.dist.toFixed(2)+' km';
    document.getElementById('csv-time-display').textContent=p.timeStr;
    document.getElementById('csv-pace-display').textContent=p.pace+' /km';
    document.getElementById('csv-hr-display').textContent=p.hr?p.hr+' bpm':'-';
    document.getElementById('csv-cal-display').textContent=p.cal?p.cal+' kcal':'-';
    document.getElementById('csv-notes').value=''; document.getElementById('csv-route-type').value='road'; document.getElementById('csv-weather').value='';
    document.getElementById('csv-modal').classList.remove('hidden');
}

function closeCSVModal() { document.getElementById('csv-modal').classList.add('hidden'); csvParsed=null; }

async function saveCSVRecord() {
    if (!csvParsed) return;
    const p=csvParsed;
    const h=Math.floor(p.durSec/3600),m=Math.floor((p.durSec%3600)/60),s=p.durSec%60;
    const res=await fetch('/api/records',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            date:p.date, distance:p.dist, duration:`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,
            heart_rate:p.hr, calories:p.cal,
            route_type:document.getElementById('csv-route-type').value,
            weather:document.getElementById('csv-weather').value,
            notes:document.getElementById('csv-notes').value,
        })
    });
    const data=await res.json();
    if (res.ok) { closeCSVModal(); showSnackbar('CSV 기록이 추가되었습니다'); loadRecords(); }
    else showSnackbar(data.error||'저장 실패','error');
}

// ── 초기화 ────────────────────────────────────────────────────
selectTab('month');
loadRecords();
