services:
  - type: web
    name: runmate
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false          # Render 대시보드에서 직접 입력
      - key: SESSION_SECRET
        generateValue: true  # Render가 자동 생성
      - key: BASE_URL
        sync: false          # 예: https://runmate.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: NAVER_CLIENT_ID
        sync: false
      - key: NAVER_CLIENT_SECRET
        sync: false
